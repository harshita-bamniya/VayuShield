version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: vayushield
      POSTGRES_PASSWORD: vayushield_dev
      POSTGRES_DB: vayushield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vayushield"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vayushield:vayushield_dev@db:5432/vayushield
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev_secret_key_change_in_prod
      ENVIRONMENT: development
      SEED_ADMIN_EMAIL: admin@vayushield.local
      SEED_ADMIN_PASSWORD: Admin@123
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
      CPCB_API_KEY: ${CPCB_API_KEY:-}
      TWILIO_ENABLED: ${TWILIO_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_DEFAULT_PHONE: ${TWILIO_DEFAULT_PHONE:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
