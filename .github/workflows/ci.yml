name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-latest
        env:
          POSTGRES_USER: vayushield
          POSTGRES_PASSWORD: vayushield_dev
          POSTGRES_DB: vayushield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install GDAL system libraries
        run: sudo apt-get update -qq && sudo apt-get install -y libgdal-dev gdal-bin
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        working-directory: backend
        run: uv pip install --system -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: |
          ruff format --check .
          ruff check .
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://vayushield:vayushield_dev@localhost:5432/vayushield
        run: alembic upgrade head
      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://vayushield:vayushield_dev@localhost:5432/vayushield
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
