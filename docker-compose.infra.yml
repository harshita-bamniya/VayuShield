version: "3.9"

# Runs only DB + Redis. Use this when running backend and frontend on the host directly.
# docker compose -f docker-compose.infra.yml up -d

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: vayushield
      POSTGRES_PASSWORD: vayushield_dev
      POSTGRES_DB: vayushield
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vayushield"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
